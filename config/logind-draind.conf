# Installed by draind — suppresses logind's built-in event handling
# so that draind can manage lid/power/sleep button events directly.
# After installing or removing this file, run:
#   systemctl restart systemd-logind
[Login]
HandleLidSwitch=ignore
HandleLidSwitchDocked=ignore
HandlePowerKey=ignore
HandleSuspendKey=ignore
HandleHibernateKey=ignore
